# Put this inside the nginx server {} that handles the public status page.
# Keep it before any catch-all proxy or rewrite rule.
location = /favicon.ico {
    root /www/server/uptime-kuma/custom;
    default_type image/x-icon;
    add_header Cache-Control "public, max-age=300, must-revalidate";
    try_files /favicon.ico =404;
}

# If the same vhost has a catch-all stop-page rewrite, exclude favicon.ico:
# rewrite ^/(?!bt-stop\.html$|favicon\.ico$).* /bt-stop.html last;
